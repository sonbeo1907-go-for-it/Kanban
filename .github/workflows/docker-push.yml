name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify WAR contents
        run: |
          echo "=== Listing JARs in WAR ==="
          jar tf target/kanban.war | grep -E "\.jar$" | sort
          echo "=== Checking for PostgreSQL driver ==="
          if jar tf target/kanban.war | grep -q "postgresql.*\.jar"; then
            echo "✅ PostgreSQL driver found"
          else
            echo "❌ PostgreSQL driver NOT found"
            exit 1
          fi
          echo "=== Checking for MySQL driver ==="
          if jar tf target/kanban.war | grep -q "mysql-connector.*\.jar"; then
            echo "❌ MySQL driver still present"
            exit 1
          else
            echo "✅ MySQL driver not found"
          fi
          echo "=== Extracting DBContext class ==="
          mkdir -p tmp/classes
          cd tmp
          jar xf ../target/kanban.war WEB-INF/classes/com/casestudy/kanban/util/DBContext.class
          echo "=== Checking DBContext for PostgreSQL references ==="
          if strings WEB-INF/classes/com/casestudy/kanban/util/DBContext.class | grep -qi "postgresql"; then
            echo "✅ DBContext uses PostgreSQL"
          else
            echo "❌ DBContext does not reference PostgreSQL"
            exit 1
          fi
          cd ..
          echo "All verification checks passed."

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kanban-app:latest
            ${{ secrets.DOCKER_USERNAME }}/kanban-app:${{ github.sha }}